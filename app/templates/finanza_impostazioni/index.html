{% extends "base.html" %}
{% block title %}Impostazioni Finanza - Ca Bianca Gestionale{% endblock %}
{% block content %}
<div class="cb-page-header">
    <h1><i class="bi bi-sliders text-cb-green"></i> Impostazioni Finanza</h1>
</div>

<div class="row g-4">
    <div class="col-lg-6">
        <!-- REVENUE STREAMS -->
        <div class="cb-card p-3">
            <h5 class="mb-3">Flussi di ricavo</h5>
            <div class="d-flex flex-wrap gap-2 mb-3">
                {% for s in streams %}
                <span class="cb-chip" style="background:{{ s.color }}">{{ s.name }}</span>
                {% endfor %}
            </div>
            <form method="POST" action="{{ url_for('finanza_impostazioni.new_stream') }}" class="row g-2">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="col">
                    <input type="text" name="name" class="form-control form-control-sm" placeholder="Nome flusso" required>
                </div>
                <div class="col-auto">
                    <input type="color" name="color" class="form-control form-control-sm form-control-color" value="#009d5a">
                </div>
                <div class="col-auto">
                    <button class="btn btn-cb btn-sm">Aggiungi</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
