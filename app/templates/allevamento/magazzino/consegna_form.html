{% extends "base.html" %}
{% block title %}Registra Consegna – Magazzino{% endblock %}
{% block content %}
<div class="cb-page-header">
    <h1><i class="bi bi-truck" style="color:#c2185b"></i> Registra Consegna</h1>
    <a href="{{ url_for('allevamento.magazzino_index') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Indietro
    </a>
</div>

<div class="cb-card p-4" style="max-width:500px">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label class="form-label fw-bold">Prodotto</label>
        <select name="tipo" class="form-select" id="tipo-prod" onchange="aggiornaForm()" required>
            {% for mp in prodotti %}
            <option value="{{ mp.tipo }}">{{ mp.tipo|capitalize }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-6">
            <label class="form-label fw-bold">Quantità (q)</label>
            <input type="number" name="quantita_q" class="form-control" step="0.1" min="0.1" required>
        </div>
        <div class="col-6">
            <label class="form-label fw-bold">Data consegna</label>
            <input type="date" name="data" class="form-control" value="{{ today }}" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Fornitore</label>
        <input type="text" name="fornitore" class="form-control">
    </div>

    <div class="mb-3 d-none" id="siero-extra">
        <label class="form-label">% Sostanza Secca siero</label>
        <div class="input-group">
            <input type="number" name="percentuale_ss" class="form-control" step="0.1" min="0" max="100" placeholder="es. 6.0">
            <span class="input-group-text">%</span>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Note</label>
        <textarea name="note" class="form-control" rows="2"></textarea>
    </div>

    <button type="submit" class="btn" style="background:#c2185b;color:white">
        <i class="bi bi-check-lg"></i> Registra
    </button>
</form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function aggiornaForm() {
    const tipo = document.getElementById('tipo-prod').value;
    document.getElementById('siero-extra').classList.toggle('d-none', tipo !== 'siero');
}
document.querySelector('[name=data]').value = new Date().toISOString().split('T')[0];
aggiornaForm();
</script>
{% endblock %}
