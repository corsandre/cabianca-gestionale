{% extends "base.html" %}
{% block title %}Modifica Evento – Allevamento{% endblock %}
{% block content %}
<div class="cb-page-header">
    <h1><i class="bi bi-pencil-square" style="color:#c2185b"></i> Modifica Evento</h1>
    <a href="{{ url_for('allevamento.cicli_detail', id=ciclo.id) }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Indietro
    </a>
</div>

<div class="cb-card p-4" style="max-width:540px">
    <div class="mb-3 p-2 rounded" style="background:#f5f5f5">
        <div class="small text-muted mb-1">Evento (non modificabile)</div>
        <span class="badge {% if ev.tipo == 'mortalita' %}bg-danger{% elif 'frazionamento' in ev.tipo %}bg-warning text-dark{% elif ev.tipo == 'riaccasamento' %}bg-info text-dark{% else %}bg-success{% endif %}">
            {{ ev.tipo|replace('_', ' ') }}
        </span>
        <span class="ms-2 small">Box {{ ev.box_ciclo.box.numero }} – Ciclo {{ ciclo.ciclo_id }}</span>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label fw-bold">Data <span class="text-danger">*</span></label>
                <input type="date" name="data" class="form-control"
                       value="{{ ev.data.strftime('%Y-%m-%d') }}" required>
            </div>
            <div class="col-6">
                <label class="form-label fw-bold">N° capi</label>
                <input type="number" name="quantita" class="form-control"
                       value="{{ ev.quantita or '' }}" min="0">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Peso totale (kg)</label>
            <input type="number" name="peso_totale" class="form-control" step="0.1" min="0"
                   value="{{ '%.1f'|format(ev.peso_totale) if ev.peso_totale else '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Note</label>
            <textarea name="note" class="form-control" rows="2">{{ ev.note or '' }}</textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn" style="background:#c2185b;color:white">
                <i class="bi bi-check-lg"></i> Salva modifiche
            </button>
            <a href="{{ url_for('allevamento.cicli_detail', id=ciclo.id) }}"
               class="btn btn-outline-secondary">Annulla</a>
        </div>
    </form>
</div>
{% endblock %}
